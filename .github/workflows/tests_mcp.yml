name: MCP

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    paths-ignore:
      - 'browser_patches/**'
      - 'docs/**'
      - 'packages/extension/**'
      - 'packages/playwright-core/src/server/bidi/**'
      - 'tests/bidi/**'
      - 'tests/extension/**'
    branches:
      - main
      - release-*

concurrency:
  # For pull requests, cancel all currently-running jobs for this workflow
  # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  # Force terminal colors. @see https://www.npmjs.com/package/colors
  FORCE_COLOR: 1
  DEBUG: pw:mcp:error

jobs:
  test_mcp:
    if: github.head_ref != 'skn0tt-debug-dashboard-registry'
    name: ${{ matrix.os }} - ${{ matrix.project }}
    # Used for authentication of flakiness upload
    environment: ${{ github.event_name == 'push' && 'allow-uploading-flakiness-results' || null }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        project: [chrome, chromium, firefox, webkit]
        include:
          - os: windows-latest
            project: chrome
          - os: windows-latest
            project: chromium
          - os: windows-latest
            project: firefox
          - os: windows-latest
            project: webkit
          - os: windows-latest
            project: msedge
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write   # This is required for OIDC login (azure/login) to succeed
      contents: read    # This is required for actions/checkout to succeed
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/run-test
      with:
        node-version: "22"
        command: npm run test-mcp -- --project=${{ matrix.project }}
        bot-name: "mcp-${{ matrix.os }}-${{ matrix.project }}"
        flakiness-client-id: ${{ secrets.AZURE_FLAKINESS_DASHBOARD_CLIENT_ID }}
        flakiness-tenant-id: ${{ secrets.AZURE_FLAKINESS_DASHBOARD_TENANT_ID }}
        flakiness-subscription-id: ${{ secrets.AZURE_FLAKINESS_DASHBOARD_SUBSCRIPTION_ID }}

  debug_dashboard_registry:
    if: github.event_name == 'pull_request' && github.head_ref == 'skn0tt-debug-dashboard-registry'
    name: Debug dashboard registry
    runs-on: macos-15-xlarge
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install browsers
        run: npx playwright install

      - name: Start restricted tmate session
        uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113
        timeout-minutes: 45
        with:
          limit-access-to-actor: true
